<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Docker 大航海 — 鯨魚港的貨櫃見習生</title>
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/harbor.css">
<link rel="stylesheet" href="css/screens.css">
<link rel="stylesheet" href="css/level.css">
</head>
<body>

<!-- 標題畫面 -->
<div class="screen" id="screen-title"></div>

<!-- 關卡地圖 -->
<div class="screen" id="screen-map"></div>

<!-- 徽章圖鑑 -->
<div class="screen" id="screen-badges"></div>

<!-- 關卡畫面：左任務面板 / 中港口舞台 / 下終端機 -->
<div class="screen" id="screen-level">
  <div class="level-topbar">
    <span class="lt-num" id="lt-num">LEVEL 1</span>
    <span class="lt-title" id="lt-title"></span>
    <span class="spacer"></span>
    <button class="icon-btn hint-btn" id="btn-hint" title="要提示（會影響星等）">
      <svg viewBox="0 0 20 20"><path d="M10 2.8 a5.2 5.2 0 0 1 3 9.4 L12.6 14 H7.4 L7 12.2 A5.2 5.2 0 0 1 10 2.8 Z" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="M8 16.5 H12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      <span class="hint-count">0</span>
    </button>
    <button class="icon-btn" id="btn-dex" title="知識徽章圖鑑">
      <svg viewBox="0 0 20 20"><circle cx="10" cy="8" r="5" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="M7 12 L6 17.5 L10 15.5 L14 17.5 L13 12" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
    </button>
    <button class="icon-btn" id="btn-mute" title="音效"></button>
    <button class="icon-btn" id="btn-map" title="回航線圖">
      <svg viewBox="0 0 20 20"><path d="M3 5 L8 3.5 L12 5.5 L17 4 V15 L12 16.5 L8 14.5 L3 16 Z M8 3.5 V14.5 M12 5.5 V16.5" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg>
    </button>
    <button class="icon-btn" id="btn-lang" title="Switch to English" style="font-size:12px;font-weight:700;letter-spacing:.04em">EN</button>
  </div>

  <div class="shell quest-panel">
    <div class="core">
      <div class="quest-scroll" id="quest-scroll"></div>
    </div>
  </div>

  <div class="shell stage-panel">
    <div class="core" id="stage-mount"></div>
  </div>

  <div class="shell term-panel">
    <div class="core">
      <div class="term-head">
        <span class="term-dot" style="background:#ff5f57"></span>
        <span class="term-dot" style="background:#febc2e"></span>
        <span class="term-dot" style="background:#28c840"></span>
        <span class="term-title">HARBOR TERMINAL — docker cli</span>
      </div>
      <div class="term-body" id="term-body"></div>
      <div class="term-input-row">
        <span class="prompt" id="term-prompt"></span>
        <input id="term-input" type="text" autocomplete="off" spellcheck="false" aria-label="終端機輸入">
      </div>
      <div class="term-lock-veil" id="term-veil" style="display:none">
        <svg width="16" height="16" viewBox="0 0 16 16"><rect x="3" y="7" width="10" height="7" rx="2" fill="none" stroke="currentColor" stroke-width="1.4"/><path d="M5 7 V5 a3 3 0 0 1 6 0 V7" fill="none" stroke="currentColor" stroke-width="1.4"/></svg>
        <span id="term-veil-text">本關不需要終端機——完成上方的互動任務（第 2 關解鎖終端機）</span>
      </div>
    </div>
  </div>
</div>

<!-- 彈窗與過場 -->
<div class="modal-veil" id="modal-result"></div>
<div class="modal-veil" id="modal-confirm"></div>
<div id="wipe"></div>

<!-- 小螢幕提示 -->
<div id="too-small">
  <div class="inner">
    <svg width="90" viewBox="0 0 120 84" xmlns="http://www.w3.org/2000/svg"><path d="M95 42 Q112 30 116 18 Q114 34 106 44 Q114 52 118 64 Q108 56 94 52 Z" fill="#31589a"/><path d="M12 50 Q14 22 52 20 Q92 18 100 44 Q102 58 84 64 Q46 74 22 62 Q12 58 12 50 Z" fill="#4a7fd6"/><circle cx="38" cy="40" r="4.2" fill="#0c1329"/><path d="M44 50 Q50 55 58 51" stroke="#0c1329" stroke-width="2" fill="none" stroke-linecap="round"/></svg>
    <h2>請用電腦遊玩</h2>
    <p>鯨魚港的碼頭作業需要寬敞的甲板——請用寬度 1024px 以上的螢幕（建議 1280px+）開啟本遊戲。</p>
  </div>
</div>

<!-- 依序載入（全部掛在 window.DG，無 module import，file:// 直開可玩） -->
<script src="js/config.js"></script>
<script src="js/i18n.js"></script>
<script src="js/engine.js"></script>
<script src="js/cli.js"></script>
<script src="js/audio.js"></script>
<script src="js/store.js"></script>
<script src="js/ui/art.js"></script>
<script src="js/ui/terminal.js"></script>
<script src="js/ui/stage.js"></script>
<script src="js/ui/screens.js"></script>
<script src="js/levels/index.js"></script>
<script src="js/levels/level01.js"></script>
<script src="js/levels/levels02-04.js"></script>
<script src="js/levels/levels05-07.js"></script>
<script src="js/levels/level08.js"></script>
<script src="js/levels/levels09-10.js"></script>
<script src="js/game.js"></script>
</body>
</html>
